<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2+2 = ?</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#111,#000);
font-family:Arial;
color:white;
overflow:hidden;
}

#box{
text-align:center;
background:rgba(255,255,255,0.07);
padding:40px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
}

h1{font-size:60px;margin-bottom:20px;}

button{
font-size:28px;
padding:12px 35px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.2s;
font-weight:bold;
}

button:hover{transform:scale(1.1);}

.correct{background:#00c853;color:white;}
.wrong{background:#d50000;color:white;}

#msg{
margin-top:20px;
font-size:28px;
font-weight:bold;
color:#ff5252;
}

.shake{
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

#videoBox{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

iframe{
width:80%;
height:70%;
border-radius:15px;
}
</style>
</head>

<body>

<div id="box">
<h1>2 + 2 = ?</h1>

<button class="correct" onclick="dogru()">4</button>
<button class="wrong" onclick="yanlis()">5</button>

<div id="msg"></div>
</div>

<div id="videoBox">
<iframe id="ytVideo" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<script>

let mesajlar = [
"Yanlış cevap 😄",
"Tekrar dene 😅",
"Olmadı 😆",
"Oops!"
];

function videoAc(){
document.getElementById("videoBox").style.display="flex";
document.getElementById("ytVideo").src=
"https://www.youtube.com/embed/5aFP-iR7hPg?autoplay=1";
}

function dogru(){
document.getElementById("msg").innerText="Doğru cevap! 🎉";
videoAc();
}

function yanlis(){

let rnd = mesajlar[Math.floor(Math.random()*mesajlar.length)];
document.getElementById("msg").innerText = rnd;

document.body.classList.add("shake");

let ses = new Audio("https://www.soundjay.com/button/beep-10.mp3");
ses.play();

setTimeout(()=>{
document.body.classList.remove("shake");
videoAc();
},1200);
}

</script>

</body>
</html>
